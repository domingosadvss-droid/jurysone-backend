version: '3.9'

# ─── Uso local (desenvolvimento) ──────────────────────────────────────────────
# Para produção use Render.com (render.yaml) + Supabase (banco de dados)
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jurysone
      POSTGRES_PASSWORD: ${DB_PASS:-jurysone_dev}
      POSTGRES_DB: jurysone_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jurysone']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./jurysone-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://jurysone:${DB_PASS:-jurysone_dev}@db:5432/jurysone_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod_min_32_chars_required}
      JWT_EXPIRES_IN: 3600
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FRONTEND_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./jurysone-backend:/app
      - /app/node_modules
    command: >
      sh -c "
        echo 'Aplicando migracoes do banco de dados...' &&
        npx prisma migrate deploy --schema src/database/schema.prisma &&
        echo 'Migracoes aplicadas. Iniciando servidor...' &&
        npm run start:dev
      "

volumes:
  pgdata:

networks:
  default:
    name: jurysone-network
