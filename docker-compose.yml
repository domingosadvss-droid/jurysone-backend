version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jurysone
      POSTGRES_PASSWORD: ${DB_PASS:-jurysone_dev}
      POSTGRES_DB: jurysone_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jurysone']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./jurysone-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://jurysone:${DB_PASS:-jurysone_dev}@db:5432/jurysone_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      JWT_EXPIRES_IN: 3600
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./jurysone-backend:/app
      - /app/node_modules
    command: >
      sh -c "
        echo '🔄 Aplicando migrações do banco de dados...' &&
        npx prisma migrate deploy --schema src/database/schema.prisma &&
        echo '✅ Migrações aplicadas. Iniciando servidor...' &&
        npm run start:dev
      "

  frontend:
    build:
      context: ./jurysone-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_nextauth_secret}
    depends_on:
      - backend
    volumes:
      - ./jurysone-frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:

networks:
  default:
    name: jurysone-network
