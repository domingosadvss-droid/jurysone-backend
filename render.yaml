services:
  # ─── Backend NestJS ────────────────────────────────────────────────────────
  - type: web
    name: jurysone-backend
    env: docker
    region: oregon
    rootDir: jurysone-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          name: jurysone-redis
          type: redis
          property: connectionString
      # Configure as demais variáveis no Dashboard do Render:
      # DATABASE_URL, DIRECT_URL, JWT_SECRET, JWT_PORTAL_SECRET,
      # JWT_REFRESH_SECRET, FRONTEND_URL, SUPABASE_URL, SUPABASE_SERVICE_KEY,
      # GEMINI_API_KEY, RESEND_API_KEY, EMAIL_FROM, JURYSONE_WEBHOOK_SECRET

  # ─── Frontend Estático ─────────────────────────────────────────────────────
  - type: web
    name: jurysone-frontend
    env: static
    region: oregon
    rootDir: app-preview
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: jurysone-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
