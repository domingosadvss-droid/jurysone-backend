services:
  # ─── Backend NestJS ────────────────────────────────────────────
  - type: web
    name: jurysone-backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health

    # Render injeta PORT automaticamente (normalmente 10000)
    # O Dockerfile e main.ts já leem process.env.PORT — está correto.

    envVars:
      - key: NODE_ENV
        value: production

      # As demais variáveis configure manualmente no Dashboard do Render:
      # Database, JWT, Gemini, Supabase, etc.
      # (não coloque valores sensíveis aqui — este arquivo vai pro Git)

  # ─── Redis (free tier do Render) ──────────────────────────────
  - type: redis
    name: jurysone-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all
